name: gazprom_mi_render
description: "Рендер QRH Газпром и МИ"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  xml: ^6.6.1
  path_provider: ^2.1.5
  file_picker: ^11.0.2
  provider: ^6.1.5+1
  flutter_markdown_plus: ^1.0.7
  go_router: ^17.2.1
  #s1000d_validator:
    #path: ../xml_validator
  s1000d_validator:
    git:
      #url: git@github.com:FeofanGreek/s1000dValidator.git
      url: https://github.com/FeofanGreek/s1000dValidator.git
      ref: main

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
flutter:
  uses-material-design: true

  assets:
    - assets/
    - assets/schemas/
